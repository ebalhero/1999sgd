<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing</title>

  <link rel="preload" as="image" href="https://iili.io/B6BEyIS.webp">

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }

    .gjs-section {
      display: flex;
      justify-content: center;
    }

    .phone-frame {
      width: 100%;
      max-width: 414px;
      margin: 0 auto;
    }

    .image-stack {
      line-height: 0;
      font-size: 0;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>

<section class="gjs-section">
  <div class="phone-frame">
    <div class="gjs-container image-stack">

      <img src="https://iili.io/B6BEyIS.webp" decoding="async"/>
      <img src="https://iili.io/B6BGdBe.webp" loading="lazy" decoding="async"/>
      <img src="https://iili.io/B6BEmp2.webp" loading="lazy" decoding="async"/>
      <img src="https://iili.io/B6BEQrG.webp" loading="lazy" decoding="async"/>

    </div>
  </div>
</section>

</body>
</html>
