<!-- COUNTDOWN -->
<section class="gjs-section">
  <div class="phone-frame">
    <div class="gjs-container image-stack" id="iedmk">

      <div class="countdown" id="i6mjy">
        <span data-js="countdown" class="countdown-cont">

          <div class="countdown-block">
            <div data-js="countdown-day" class="countdown-digit"></div>
            <div class="countdown-label">days</div>
          </div>

          <div class="countdown-block">
            <div data-js="countdown-hour" class="countdown-digit"></div>
            <div class="countdown-label">hours</div>
          </div>

          <div class="countdown-block">
            <div data-js="countdown-minute" class="countdown-digit"></div>
            <div class="countdown-label">minutes</div>
          </div>

          <div class="countdown-block">
            <div data-js="countdown-second" class="countdown-digit"></div>
            <div class="countdown-label">seconds</div>
          </div>

        </span>

        <span data-js="countdown-endtext" class="countdown-endtext"></span>
      </div>

    </div>
  </div>
</section>

<!-- SECTION 3 -->
<section class="gjs-section">
  <div class="phone-frame">
    <div class="gjs-container image-stack">

      <img src="https://iili.io/B6BGy8v.webp" loading="lazy" decoding="async"/>
      <img src="https://iili.io/B6BMdwN.webp" loading="lazy" decoding="async"/>

      <img src="https://iili.io/B6BMCcG.webp" loading="lazy" decoding="async"/>

    </div>
  </div>
</section>

<script>
var now = Date.now;
var start = new Date("2026-04-30").getTime();

var d = document.querySelector('[data-js=countdown-day]');
var h = document.querySelector('[data-js=countdown-hour]');
var m = document.querySelector('[data-js=countdown-minute]');
var s = document.querySelector('[data-js=countdown-second]');
var container = document.querySelector('[data-js=countdown]');
var endText = document.querySelector('[data-js=countdown-endtext]');

function update() {
  var t = start - now();

  if (t < 0) {
    container.style.display = 'none';
    endText.style.display = '';
    endText.innerHTML = "promosi tamat";
    clearInterval(interval);
    return;
  }

  var days = Math.floor(t / 86400000);
  var hours = Math.floor((t % 86400000) / 3600000);
  var mins = Math.floor((t % 3600000) / 60000);
  var secs = Math.floor((t % 60000) / 1000);

  d.innerHTML = days.toString().padStart(2,'0');
  h.innerHTML = hours.toString().padStart(2,'0');
  m.innerHTML = mins.toString().padStart(2,'0');
  s.innerHTML = secs.toString().padStart(2,'0');
}

var interval = setInterval(update, 1000);
update();
</script>
