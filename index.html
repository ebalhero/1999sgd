<script>
var props = {"i6mjy":{"startfrom":"2026-04-30","endText":"promosi tamat"}};

var now = Date.now;

var el = document.getElementById("i6mjy");
var config = props["i6mjy"];

var start = new Date(config.startfrom).getTime();
var container = el.querySelector('[data-js=countdown]');
var endText = el.querySelector('[data-js=countdown-endtext]');

var d = el.querySelector('[data-js=countdown-day]');
var h = el.querySelector('[data-js=countdown-hour]');
var m = el.querySelector('[data-js=countdown-minute]');
var s = el.querySelector('[data-js=countdown-second]');

function update() {
  var t = start - now();

  if (t < 0) {
    container.style.display = 'none';
    endText.style.display = '';
    endText.innerHTML = config.endText;
    clearInterval(interval);
    return;
  }

  var days = Math.floor(t / 86400000);
  var hours = Math.floor((t % 86400000) / 3600000);
  var mins = Math.floor((t % 3600000) / 60000);
  var secs = Math.floor((t % 60000) / 1000);

  d.innerHTML = days.toString().padStart(2,'0');
  h.innerHTML = hours.toString().padStart(2,'0');
  m.innerHTML = mins.toString().padStart(2,'0');
  s.innerHTML = secs.toString().padStart(2,'0');
}

var interval = setInterval(update, 1000);
update();
</script>
